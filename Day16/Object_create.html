<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>전통적상속</title>
  </head>
  <body>
    <h1>Object.create()</h1>
    <script>
      var 부모 = { name: "Kim", age: 50 };
      var 자식 = Object.create(부모); //prototype 정의만이라 {} 이것만
      console.log(자식.age); //이 떄는 50
      자식.age = 20; //이떄 20으로 변함
      //이러면 상속완료

      var 손자 = Object.create(자식);
      console.log(손자.age);
    </script>
  </body>
</html>
