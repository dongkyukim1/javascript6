<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        
        function 임시함수(){
            return 10 
        }

        function 더하기(a,b=임시함수()){ //디폴트 파라미터 개념 
            console.log(a+b);
        }
        더하기(1); // 이건 3나온다.
    </script>
    <script>
        //아규먼트 개념 -> 모든 파라미터를 한꺼번에 싸잡아서 다루고 싶을 경우
        function 함수(a,b,c){
            console.log(arguments[0]);
            console.log(arguments[1]);
        }

        함수(1,2,3);
        //아큐먼트 + for 반복문으로 하나씩 뽑아 내버리기
        function quiz(a,b,c){
            for(var i =0; i<arguments.length ;i++){
                console.log(arguments[i]);
            }
        }
        quiz(1,2,3,4)
    </script>

</body>
</html>
