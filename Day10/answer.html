<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spread,rest 답안</title>
  </head>
  <body>
    <script>
      var a = [1, 2, 3];
      var b = "김밥";
      var c = [...b, ...a]; /// var c = ['김','밥',1,2,3]
      console.log(c);
    </script>

    <script>
      var a = [1, 2, 3];
      var b = ["you", "are"];
      var c = function (a, b) {
        console.log([[...a], ...[...b]][1]); // --> console.log([[1,2,3,],'you','are'][1])
      };
      c(a, b);
    </script>

    <script>
      function 함수(a = 5, b = a * 2) {
        //a는 3 , b에 디폴트 파라미터 작동
        console.log(a + b);
        return 10;
      }
      함수(3);
    </script>

    <script>
      function 함수(a = 5, b = a * 2) {
        console.log(a + b); //디폴트 파라미터 발동 5, 10
      }
      함수(undefined, undefined);
    </script>

    <script>
      function 어레이(a, b, c, d, e, f) {
        //확장성이없다.
        return [a, b, c, d, e, f];
      }
      var newArray = 어레이(1, 2, 3, 4, 5);
      console.log(newArray);
    </script>

    <script>
      function 어레이(...rest) {
        //이게 확장성이다.
        return rest;
      }
      var newArray = 어레이(1, 2, 3, 4, 5);
      console.log(newArray);
    </script>

    <script>
      function 최대값(arr) {
        return Math.max(...arr);
      }
      var numbers = 최대값([2, 3, 4, 5, 6, 7, 8]);
      console.log(numbers);
    </script>

    <script>
      function 정렬(글자) {
        console.log([...글자].sort());
      }
      정렬("bear"); // → a b e r
    </script>

    <script>
      function 글자세기(글자) {
        const 결과 = [...글자].reduce((acc, a) => {
          acc[a] = (acc[a] || 0) + 1;
          return acc;
        }, {});
        console.log(결과);
      }
      글자세기("aacbbb");
    </script>
  </body>
</html>
