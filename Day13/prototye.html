<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>프로토타입</title>
  </head>
  <body>
    <h3>prototype은 유전자</h3>
    <h2>컨스트럭트를 만들면 프로토타입이라는 공간이 자동으로 생김</h2>

    <script>
      var 학생1 = {
        name: "kim",
        age: 15,
        sayHi: function () {
          console.log("안녕하세요. " + this.name + "입니다");
        },
      };
      console.log(학생1); // {name: "kim", age: 15, sayHi: ƒ}
      console.log(학생1.name);

      function 기계(이름) {
        //이런거를 상속이라고 함 (부모
        this.name = 이름;
        this.age = 15;
        this.sayHi = function () {
          console.log("안녕하세요. " + this.name + "입니다");
        };
      }
      기계("park");
      var 학생2 = new 기계("park"); //자식
      var 학생3 = new 기계("lee"); //자식
      학생2.sayHi();
      기계.prototype.gender = "남자"; //prototype에 추가하면 모든 object가 공유함

      학생3.toString(); //object를 string으로 바꿔줌(내장함수) 자식 -> 부모 -> 부모의 부모 -> 부모의 부모의 부모 까지 뒤져서 함수 찿는다.

      var arr = new Array(7, 5, 4); //arr은 Array의 자식이다.
      Array.prototype; // 얘가 부모인데 왠만한 함수는 다 있다.
      arr.sort(); //arr은 Array의 자식이다. 부모의 부모의 부모까지 가서 찾는다.그래서 Array의 sort를 사용한다.
      console.log(arr); // [1, 2, 3] -> 부모의 부모의 부모까지 가서 찾는다.
    </script>
  </body>
</html>
